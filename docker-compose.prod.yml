services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-milkfarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-milk_farm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-milkfarm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/anomalyco/milk-farm/backend}:${BACKEND_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-milkfarm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-milk_farm}
      HOST: 0.0.0.0
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://milkfarm.example.com}
      RUST_LOG: ${RUST_LOG:-info,milk_farm_backend=debug}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://analytics-ml:8001}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/anomalyco/milk-farm/frontend}:${FRONTEND_TAG:-latest}
    environment:
      PORT: 3000
      ORIGIN: ${ORIGIN:-https://milkfarm.example.com}
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  analytics-ml:
    build: ./analytics-ml
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-milkfarm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-milk_farm}
      MODEL_DIR: /app/models
    volumes:
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  ml_models:
