groups:
  - name: milk-farm
    rules:
      - alert: HighErrorRate
        expr: (sum(rate(http_requests_total{status=~"5.."}[5m])) or vector(0)) / sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency"
          description: "p95 latency is {{ $value }}s (threshold: 1s)"

      - alert: ServiceDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Backend has been unreachable for 1 minute"

      - alert: MLServiceDown
        expr: up{job="analytics-ml"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ML service is down"
          description: "ML service has been unreachable for 2 minutes"

      - alert: DBPoolExhausted
        expr: db_pool_idle / db_pool_size < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB pool nearly exhausted"
          description: "Only {{ $value | humanizePercentage }} connections idle"

      - alert: RateLimitSpike
        expr: increase(rate_limit_rejections_total[5m]) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Rate limit spike detected"
          description: "{{ $value }} rejections in 5 minutes"

      - alert: LelySyncFailures
        expr: increase(lely_sync_total{status="error"}[30m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Lely sync failures"
          description: "{{ $value }} sync failures in 30 minutes"
