global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: "/metrics"

  - job_name: "analytics-ml"
    static_configs:
      - targets: ["host.docker.internal:8001"]
    metrics_path: "/metrics"
