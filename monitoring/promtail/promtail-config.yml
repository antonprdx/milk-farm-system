server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
        regex: "/(.*)"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            target: target
      - labels:
          level:
          target:
      - timestamp:
          source: time
          format: RFC3339Nano

  - job_name: backend_native
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "backend"
          host: "dev"
        __path__: "/host-logs/backend.json"
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: fields.message
            target: target
            timestamp: timestamp
      - labels:
          level:
          target:
      - timestamp:
          source: timestamp
          format: RFC3339
